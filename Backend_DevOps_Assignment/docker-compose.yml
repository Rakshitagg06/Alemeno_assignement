services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    networks:
      - app_network

  api:
    image: alemeno-transaction-pipeline:latest
    build:
      context: .
      dockerfile: app/Dockerfile
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8001:8000"
    volumes:
      - uploaded_files:/tmp/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure
    networks:
      - app_network

  worker:
    image: alemeno-transaction-pipeline:latest
    build:
      context: .
      dockerfile: app/Dockerfile
    env_file:
      - .env
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - uploaded_files:/tmp/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure
    networks:
      - app_network

volumes:
  postgres_data:
  uploaded_files:

networks:
  app_network:
    driver: bridge
